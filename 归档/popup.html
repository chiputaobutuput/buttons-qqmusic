<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTONS × QQ音乐超级礼遇 - 弹窗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f0f0;
            color: #fff;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* 手机设备框架 */
        .phone-frame {
            width: 390px;
            height: 844px;
            background-color: #000;
            border-radius: 40px;
            padding: 60px 20px 80px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 14px;
            z-index: 1000;
        }
        
        .status-left {
            display: flex;
            align-items: center;
        }
        
        .status-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 弹窗样式 */
        .popup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(0, 100, 50, 0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .popup-content {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border-radius: 24px;
            padding: 30px 20px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 128, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .popup-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 128, 0.1), transparent);
            animation: rotate 6s linear infinite;
            z-index: 0;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .popup-content > * {
            position: relative;
            z-index: 1;
        }
        
        .hali-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            overflow: hidden;
            border: 2px solid #00ff80;
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .hali-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .popup-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ff80;
            text-shadow: 0 0 8px rgba(0, 255, 128, 0.5);
        }
        
        .popup-desc {
            font-size: 13px;
            color: #e0e0e0;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .btn-primary {
            background-color: #00ff80;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 255, 128, 0.3);
        }
        
        .btn-primary:hover {
            background-color: #00e676;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 255, 128, 0.4);
        }
        
        /* 底部安全区域 */
        .bottom-safe {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 34px;
            background-color: #000;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- 手机设备框架 -->
    <div class="phone-frame">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-left">9:06</div>
            <div class="status-right">
                <span>📶</span>
                <span>Wi-Fi</span>
                <span>🔋</span>
            </div>
        </div>
        
        <!-- 活动弹窗 -->
        <div id="popup" class="popup">
            <div class="popup-content">
                <button onclick="closePopup()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: #00ff80; font-size: 18px; cursor: pointer;">×</button>
                <div class="hali-image">
                    <img src="HALI.png" alt="HALI">
                </div>
                <h2 class="popup-title">BUTTONS × QQ音乐</h2>
                <h2 class="popup-title">超级礼遇</h2>
                <p class="popup-desc">尊享百万曲库与臻品音质</p>
                <button class="btn-primary" onclick="openActivityPage()">立即查收</button>
            </div>
        </div>
        
        <!-- 底部安全区域 -->
        <div class="bottom-safe"></div>
    </div>
    
    <script>
        // 打开活动页面
        function openActivityPage() {
            window.location.href = 'activity.html';
        }
        
        // 关闭弹窗
        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTONS × QQ音乐超级礼遇 - 活动页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f0f0;
            color: #fff;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* 手机设备框架 */
        .phone-frame {
            width: 390px;
            height: 844px;
            background-color: #000;
            border-radius: 40px;
            padding: 60px 20px 80px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 14px;
            z-index: 1000;
        }
        
        .status-left {
            display: flex;
            align-items: center;
        }
        
        .status-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 内容容器 */
        .container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        
        .container::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Edge */
        }
        
        /* 底部安全区域 */
        .bottom-safe {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 34px;
            background-color: #000;
            z-index: 1000;
        }
        
        /* 活动主页面 */
        .activity-header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }
        
        .activity-title {
            font-size: 18px;
            font-weight: bold;
            color: #00ff80;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(0, 255, 128, 0.5);
        }
        
        .progress {
            font-size: 12px;
            color: #e0e0e0;
            margin-bottom: 15px;
        }
        
        .module-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .module-card {
            background: rgba(20, 20, 20, 0.8);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 128, 0.2);
            transition: all 0.3s ease;
        }
        
        .module-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .module-card .button-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .module-card .module-btn {
            flex: none;
            width: calc(50% - 4px);
            font-size: 12px;
            padding: 8px 16px;
        }
        
        .module-card:hover {
            box-shadow: 0 4px 15px rgba(0, 255, 128, 0.3);
            transform: translateY(-1px);
        }
        
        .module-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #00ff80;
            text-shadow: 0 0 5px rgba(0, 255, 128, 0.3);
        }
        
        .module-desc {
            font-size: 13px;
            color: #e0e0e0;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .module-btn {
            background-color: #00ff80;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0, 255, 128, 0.3);
        }
        
        .module-btn:hover {
            background-color: #00e676;
            box-shadow: 0 5px 12px rgba(0, 255, 128, 0.4);
        }
        
        .module-btn:disabled {
            background-color: #666 !important;
            cursor: not-allowed !important;
        }
        
        /* 提示弹窗 */
        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #00ff80;
            text-align: center;
            z-index: 1001;
            max-width: 85%;
            white-space: nowrap;
        }
        
        .toast-content {
            color: #00ff80;
            font-size: 14px;
            line-height: 1.4;
        }
        
        /* 隐藏类 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 手机设备框架 -->
    <div class="phone-frame">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-left">9:06</div>
            <div class="status-right">
                <span>📶</span>
                <span>Wi-Fi</span>
                <span>🔋</span>
            </div>
        </div>
        
        <!-- 活动主页面 -->
        <div id="activityPage" class="container">
            <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative;">
                <button onclick="closeActivity()" style="background: none; border: none; color: #00ff80; font-size: 20px; position: absolute; left: 0; top: 50%; transform: translateY(-50%); cursor: pointer;">&lt;</button>
                <h1 class="activity-title" style="margin: 0;">BUTTONS × QQ音乐超级礼遇</h1>
            </div>
            <div class="activity-header">
                <p class="progress">领取进度：0/3</p>
            </div>
            
            <div class="module-list">
                <!-- 模块1：查收礼遇 -->
                <div class="module-card">
                    <h3 class="module-title">查收礼遇</h3>
                    <p class="module-desc">点击立即查收，领取QQ音乐超级会员月卡</p>
                    <div class="button-container">
                        <button class="module-btn" onclick="claimGift()">立即查收</button>
                    </div>
                </div>
                
                <!-- 模块2：关注官方账号 -->
                <div class="module-card">
                    <h3 class="module-title">关注官方账号</h3>
                    <p class="module-desc">关注BUTTONS官方账号，领取QQ音乐超级会员月卡</p>
                    <div class="button-container">
                        <button class="module-btn" onclick="followOfficial()">立即关注</button>
                    </div>
                </div>
                
                <!-- 模块3：提交建议 -->
                <div class="module-card">
                    <h3 class="module-title">提交建议</h3>
                    <p class="module-desc">提交您的宝贵建议，领取QQ音乐超级会员月卡</p>
                    <div class="button-container">
                        <button class="module-btn" onclick="openSuggestionForm()">立即提交</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 提示弹窗 -->
        <div id="toast" class="toast hidden">
            <p class="toast-content" id="toastMessage"></p>
        </div>
        
        <!-- 底部安全区域 -->
        <div class="bottom-safe"></div>
    </div>
    
    <script>
        // 全局变量
        let progress = 0;
        
        // 关闭活动页面
        function closeActivity() {
            window.location.href = 'popup.html';
        }
        
        // 领取礼遇
        function claimGift() {
            progress = 1;
            updateProgress();
            showToast('已解锁30天QQ音乐超级会员！');
            
            // 禁用按钮并添加查看兑换码按钮
            const btn = document.querySelector('.module-card:nth-child(1) .module-btn');
            btn.disabled = true;
            btn.style.backgroundColor = '#666';
            btn.style.cursor = 'not-allowed';
            
            // 添加查看兑换码按钮（如果不存在）
            const container = document.querySelector('.module-card:nth-child(1) .button-container');
            if (container.querySelectorAll('.module-btn').length === 1) {
                const codeBtn = document.createElement('button');
                codeBtn.className = 'module-btn';
                codeBtn.textContent = '查看兑换码';
                codeBtn.style.backgroundColor = '#00ff80';
                codeBtn.onclick = () => openCodePage();
                container.appendChild(codeBtn);
            }
        }
        
        // 关注官方账号
        function followOfficial() {
            // 跳转到BUTTONS品牌微信服务号
            window.location.href = 'weixin://dl/officialaccounts?appid=BUTTONS';
            
            // 显示关注确认弹窗
            setTimeout(() => {
                showFollowConfirmDialog();
            }, 500);
        }
        
        // 显示关注确认弹窗
        function showFollowConfirmDialog() {
            // 创建确认弹窗
            const dialog = document.createElement('div');
            dialog.id = 'followConfirmDialog';
            dialog.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 2000;
            `;
            
            dialog.innerHTML = `
                <div style="
                    background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
                    border-radius: 16px;
                    padding: 30px 25px;
                    width: 80%;
                    max-width: 300px;
                    text-align: center;
                    border: 1px solid rgba(0, 255, 128, 0.3);
                ">
                    <h3 style="color: #00ff80; margin-bottom: 15px; font-size: 18px;">关注确认</h3>
                    <p style="color: #e0e0e0; margin-bottom: 25px; font-size: 14px; line-height: 1.5;">请确认您已成功关注BUTTONS品牌微信服务号</p>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="closeFollowDialog()" style="
                            flex: 1;
                            background: transparent;
                            color: #999;
                            border: 1px solid #666;
                            padding: 10px;
                            border-radius: 8px;
                            font-size: 14px;
                            cursor: pointer;
                        ">取消</button>
                        <button onclick="confirmFollow()" style="
                            flex: 1;
                            background: #00ff80;
                            color: #000;
                            border: none;
                            padding: 10px;
                            border-radius: 8px;
                            font-size: 14px;
                            font-weight: bold;
                            cursor: pointer;
                        ">已关注</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(dialog);
        }
        
        // 关闭关注确认弹窗
        function closeFollowDialog() {
            const dialog = document.getElementById('followConfirmDialog');
            if (dialog) {
                dialog.remove();
            }
        }
        
        // 确认已关注
        function confirmFollow() {
            closeFollowDialog();
            
            progress = 2;
            updateProgress();
            showToast('已解锁30天QQ音乐超级会员！');
            
            // 禁用按钮并添加查看兑换码按钮
            const btn = document.querySelector('.module-card:nth-child(2) .module-btn');
            btn.disabled = true;
            btn.style.backgroundColor = '#666';
            btn.style.cursor = 'not-allowed';
            
            // 添加查看兑换码按钮（如果不存在）
            const container = document.querySelector('.module-card:nth-child(2) .button-container');
            if (container.querySelectorAll('.module-btn').length === 1) {
                const codeBtn = document.createElement('button');
                codeBtn.className = 'module-btn';
                codeBtn.textContent = '查看兑换码';
                codeBtn.style.backgroundColor = '#00ff80';
                codeBtn.onclick = () => openCodePage();
                container.appendChild(codeBtn);
            }
        }
        
        // 打开建议表单
        function openSuggestionForm() {
            window.location.href = 'suggestion.html';
        }
        
        // 打开兑换码页面
        function openCodePage() {
            window.location.href = 'code.html';
        }
        
        // 更新进度
        function updateProgress() {
            document.querySelector('.progress').textContent = `领取进度：${progress}/3`;
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            
            // 3秒后隐藏
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
